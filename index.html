<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <title>Mesto</title>
  <link rel="stylesheet" href="./pages/index.css">
</head>
<body>
  <div class="root">

    <header class="header root__section">
      <img src="./images/logo.svg" alt="mesto logo" class="logo">
    </header>

    <div class="profile root__section">
      <div class="user-info">
        <button class="user-info__photo"></button>
        <div class="user-info__data">
          <h1 class="user-info__name"></h1>
          <p class="user-info__job"></p>
          <button class="user-info__edit">Edit</button>
        </div>
        <button class="button user-info__button">+</button>
      </div>
    </div>

    <div class="places-list root__section">

      <!-- Пример вёрстки карточки: -->

      <!-- <div class="place-card">
        <div class="place-card__image" style="background-image: url(https://pictures.s3.yandex.net/frontend-developer/cards-compressed/kamchatka.jpg)">
          <button class="place-card__delete-icon"></button>
        </div>
        <div class="place-card__description">
          <h3 class="place-card__name">Камчатка</h3>
          <button class="place-card__like-icon"></button>
        </div>
      </div> -->

      <!-- конец примера. -->

    </div>

    <!-- меню для добавления карточек -->
    <div class="popup popup_type_add-card">
      <div class="popup__content">
        <img src="./images/close.svg" alt="" class="popup__close">
        <h3 class="popup__title">Новое место</h3>
        <form class="popup__form" name="new">
            <input type="text" name="namePlace" class="popup__input popup__input_type_name" 
                  placeholder="Название" minlength="2" maxlength="30" required>
            <p class="popup__explanation-text"></p>
            <input type="text" name="link" class="popup__input popup__input_type_link-url" 
                  placeholder="Ссылка на картинку" required>
            <p class="popup__explanation-text"></p>
            <button type="submit" class="button popup__button">+</button>
        </form>
      </div>
    </div>

    <!-- меню для редактирования профиля -->
    <div class="popup popup_type_edit-unfo">
      <div class="popup__content">
        <img src="./images/close.svg" alt="" class="popup__close">
        <h3 class="popup__title">Редактировать профиль</h3>
        <form class="popup__form" name="edit">
            <input type="text" name="nameAuthor" class="popup__input popup__input_type_name" 
                   placeholder="Имя" minlength="2" maxlength="30" required>
            <p class="popup__explanation-text"></p>
            <input type="text" name="aboutMe" class="popup__input popup__input_type_name" 
                   placeholder="О себе" minlength="2" maxlength="30" required>
            <p class="popup__explanation-text"></p>
            <button type="submit" class="button popup__button">Сохранить</button>
        </form>
      </div>
    </div>

    <!-- меню для редактирования аватара -->
    <div class="popup popup_type_edit-avatar">
      <div class="popup__content">
        <img src="./images/close.svg" alt="" class="popup__close">
        <h3 class="popup__title">Обновить аватар</h3>
        <form class="popup__form" name="avatar">
            <input type="text" name="linkAvatar" class="popup__input popup__input_type_link-url" 
                   placeholder="Ссылка на аватар" required>
            <p class="popup__explanation-text"></p>
            <button type="submit" class="button popup__button">Сохранить</button>
        </form>
      </div>
    </div>

  <!-- конец root   -->
  </div>

  <script src="js/Api.js"></script>
  <script src="js/CardList.js"></script>
  <script src="js/Card.js"></script>
  <script src="js/Popup.js"></script>  
  <script src="js/UserInfo.js"></script> 
  <script src="js/FormValidator.js"></script>
  <script src="js/script.js"></script>
</body>
</html>
